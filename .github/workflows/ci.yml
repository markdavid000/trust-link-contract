name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --retries 1

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo build --workspace --release
      - run: cargo build --workspace --release --target wasm32v1-none

  bindings:
    name: TypeScript bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Build contract WASM
        run: cargo build --workspace --release --target wasm32v1-none
      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v23.0.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install bindings devDependencies
        working-directory: bindings
        run: npm ci
      - name: Regenerate TypeScript bindings from the built contract
        working-directory: bindings
        run: npm run generate
      - name: Fail if the regenerated bindings differ from what's committed
        run: |
          if ! git diff --exit-code -- bindings/src; then
            echo "::error::bindings/src is out of sync with the contract." \
              "Run 'npm run generate' inside bindings/ and commit the result."
            exit 1
          fi
      - name: Typecheck the (possibly CLI-regenerated) bindings
        working-directory: bindings
        run: npm run typecheck

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: true
