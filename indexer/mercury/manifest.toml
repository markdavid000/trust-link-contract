topic_1_xdr = "AAAADwAAAAZFc2Nyb3c="   # Symbol("Escrow")
topic_2_xdr = "AAAADwAAAAdTaGlwcGVk"   # Symbol("Shipped")
max_single_size = 250

[[subscription]]
