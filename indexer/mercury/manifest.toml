# Mercury Event Subscription Manifest — TrustLink Escrow
#
# Deploy with the Mercury CLI:
#   mercury-cli subscribe --manifest indexer/mercury/manifest.toml
#
# Or register subscriptions one-by-one via the Mercury dashboard at
#   https://mercurydata.app
#
# Each [[subscription]] block tells Mercury which contract events to
# capture.  Topic values are XDR-encoded ScVal base64 strings.  Generate
# them with the stellar CLI:
#   stellar xdr encode --type ScVal --input json '{"type":"symbol","value":"Escrow"}'
#
# Reference:
#   https://docs.mercurydata.app/subscriptions/event-subscriptions

[network]
# "mainnet" | "testnet"
name = "testnet"

[contract]
# Replace with the deployed contract address.
id = "${CONTRACT_ID}"

# ---------------------------------------------------------------------------
# Escrow lifecycle events
# topic_1 = first topic symbol ("Escrow", "Dispute", etc.)
# topic_2 = second topic symbol ("Created", "Funded", etc.)
# topic_3 = optional participant address (seller / buyer / resolver)
#
# max_single_size caps the byte budget per event stored by Mercury.
# 300 bytes comfortably covers the largest payload (EscrowCreated).
# ---------------------------------------------------------------------------

[[subscription]]
type        = "event"
topic_1_xdr = "AAAADwAAAAZFc2Nyb3c="   # Symbol("Escrow")
topic_2_xdr = "AAAADwAAAAdDcmVhdGVk"   # Symbol("Created")
max_single_size = 300

[[subscription]]
type        = "event"
topic_1_xdr = "AAAADwAAAAZFc2Nyb3c="   # Symbol("Escrow")
topic_2_xdr = "AAAADwAAAAZGdW5kZWQ="   # Symbol("Funded")
max_single_size = 200

